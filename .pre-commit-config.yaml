# Pre-commit hook configuration. Runs on every `git commit`.
# Install once with `uvx pre-commit install`. Manual run: `uvx pre-commit run --all-files`.

repos:
  # ─── Standard sanity hooks ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # tsconfig.*.json are JSONC (with comments) — not strict JSON.
        exclude: ^frontend/tsconfig(\..*)?\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Python: ruff (lint + format) ──────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$

  # ─── Everything else: prettier (JS/TS/JSON/MD/YAML/CSS/HTML) ───────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, html, markdown, yaml]
        exclude: |
          (?x)^(
              frontend/package-lock\.json|
              backend/uv\.lock|
              .*\.min\.(js|css)
          )$
